workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2 
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*' # Theo dõi tất cả các branch
    scripts:
      - name: Get Flutter dependencies
        script: flutter packages pub get
      - name: Build Flutter iOS
        script: |
          # Build cho simulator để không yêu cầu Certificate/Provisioning Profile
          flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/*.app 
    publishing:
      email:
        recipients:
