workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2 
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Get Flutter dependencies
        script: flutter packages pub get
      - name: Build Flutter iOS
        script: |
          # Build bản debug để kiểm tra lỗi nhanh hơn và không yêu cầu ký số khắt khe
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app # Vì không có chứng chỉ Apple nên nó sẽ ra file .app thay vì .ipa
    publishing:
      email:
        recipients:
          - vothanhtri1509@gmail.com # Mình lấy từ email trong ảnh log của bạn nhé