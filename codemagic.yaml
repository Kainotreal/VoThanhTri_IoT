workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2 
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*' # Theo dõi tất cả các branch (bao gồm branch DA của bạn)
    scripts:
      - name: Get Flutter dependencies
        script: flutter packages pub get
      - name: Build Flutter iOS (Unsigned)
        script: |
          # Build bản release nhưng không ký mã
          flutter build ios --release --no-codesign
          
          # Tự động đóng gói thành file .ipa để dễ dàng tải về
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload
    artifacts:
      - build/ios/iphoneos/app.ipa # File này bạn có thể tải về và cài qua Sideloadly/3uTools
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - vothanhtri1509@gmail.com