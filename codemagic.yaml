workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2 
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*' # Theo dõi tất cả các branch (bao gồm branch DA của bạn)
    scripts:
      - name: Get Flutter dependencies
        script: flutter packages pub get
      - name: Build Flutter iOS (Unsigned IPA)
        script: |
          set -e
          
          # Build bản release (đã tắt ký mã trong project.pbxproj)
          flutter build ios --release --no-codesign
          
          # Đóng gói IPA
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload
          echo "Build and packaging successful!"
    artifacts:
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - vothanhtri1509@gmail.com