workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2 
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*' # Theo dõi tất cả các branch (bao gồm branch DA của bạn)
    scripts:
      - name: Get Flutter dependencies
        script: flutter packages pub get
      - name: Build Flutter iOS (Unsigned IPA)
        script: |
          # Ép dừng nếu có lỗi
          set -e
          
          # Build ra bản IPA không ký mã (đây là lệnh chuẩn hơn)
          flutter build ipa --release --no-codesign
          
          # Tìm file .app và đóng gói thủ công nếu cần (Đôi khi ipa build ra ở thư mục khác)
          # Chúng ta sẽ kiểm tra thư mục build để tìm thành phẩm
          find build/ios/archive/Runner.xcarchive/Products/Applications -name "*.app" || true
          
          # Cách đóng gói IPA truyền thống nếu lệnh trên chỉ ra .app
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cd $(dirname "$APP_PATH")
            mkdir -p Payload
            cp -r $(basename "$APP_PATH") Payload/
            zip -r app.ipa Payload
            echo "IPA created successfully at $(pwd)/app.ipa"
          else
            echo "Error: No .app file found to package"
            exit 1
          fi
    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/archive/Runner.xcarchive/Products/Applications/*.app
    publishing:
      email:
        recipients:
          - vothanhtri1509@gmail.com